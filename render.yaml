services:
  - type: web
    name: coauthor-studio
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e . --no-deps
    startCommand: uvicorn augmented_fiction.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: OPENAI_API_KEY
        sync: false   # set manually in Render dashboard
