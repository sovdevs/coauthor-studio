services:
  - type: web
    name: coauthor-studio
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=src uvicorn augmented_fiction.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # set manually in Render dashboard
